<!DOCTYPE html>
<html>
<head>
    <title>Crop Recommendation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🌱 Crop Recommendation System</h1>

        <p>
        Enter soil parameters to get the best crop recommendation.
        </p>
        <form action="/predict" method="POST">

            <label>Nitrogen:</label>
            <input type="number" name="N" placeholder="Enter Nitrogen value" required>

            <br><br>

            <label>Phosphorus:</label>
            <input type="number" name="P" placeholder="Enter Phosphorus value" required>


            <br><br>

            <label>Potassium:</label>
            <input type="number" name="K" placeholder="Enter Potassium value" required>

            <br><br>
            <label>pH:</label>
            <input type="number" step="0.1" name="ph" placeholder="Enter pH value" required>

            <br><br>

            <label>Soil Moisture:</label>
            <input type="number" name="soil_moisture" placeholder="Enter Soil Moisture" required>

        <br><br>

            <button type="submit">
                Predict
            </button>

            {% if prediction %}
            <div class="result">
                <h2>🌱 Recommended Crop</h2>
                <h3>{{ prediction }}</h3>
            </div>
            {% endif %}
        </form>
    </div>

</body>
</html>
